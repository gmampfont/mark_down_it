<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fomatec MD converter</title>
  <link rel="icon" href="{{ url_for('static', filename='FMLogo.png') }}" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<header class="site-header">
  <div class="container">
    <a class="brand" href="/">
      <img class="brand-logo" src="{{ url_for('static', filename='FMLogo.png') }}" alt="Fomatec" />
    </a>
    <nav class="main-nav" id="mainNav">
      <a href="https://fomatecsolutions.com/">Fomatec Solutions</a>
    </nav>
  </div>
</header>

<main>
  <section class="section cream">
    <div class="container converter">
      <h1>MD Converter</h1>
      <p class="sub">Upload a PDF, Word, PowerPoint, Excel, HTML, image, audio file and more — get clean Markdown back.</p>

      <div class="card">
        <div id="drop">
          <div>Drag &amp; drop a file here, or <strong>click to browse</strong></div>
          <div id="fname"></div>
        </div>
        <input type="file" id="file" />

        <div class="row">
          <button class="btn btn-light" id="preview" disabled>Preview Markdown</button>
          <button class="btn btn-dark" id="download" disabled>Convert &amp; Download .md</button>
        </div>

        <div id="status"></div>
        <pre id="out"></pre>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <small>&copy; 2026 FOMATEC</small>
  </div>
</footer>

<script>
  const drop = document.getElementById('drop');
  const fileInput = document.getElementById('file');
  const fname = document.getElementById('fname');
  const previewBtn = document.getElementById('preview');
  const downloadBtn = document.getElementById('download');
  const status = document.getElementById('status');
  const out = document.getElementById('out');
  let selected = null;

  function setFile(f) {
    selected = f;
    fname.textContent = f ? `Selected: ${f.name}` : '';
    previewBtn.disabled = downloadBtn.disabled = !f;
    out.style.display = 'none';
    status.textContent = '';
    status.className = '';
  }

  drop.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });

  ['dragenter', 'dragover'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
  ['dragleave', 'drop'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
  drop.addEventListener('drop', e => { if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });

  function busy(on, msg) {
    previewBtn.disabled = downloadBtn.disabled = on;
    status.className = '';
    status.innerHTML = on ? `<span class="spin"></span>${msg || 'Converting…'}` : '';
  }
  function fail(msg) {
    status.className = 'err';
    status.textContent = msg;
  }

  previewBtn.addEventListener('click', async () => {
    if (!selected) return;
    busy(true);
    try {
      const fd = new FormData();
      fd.append('file', selected);
      const res = await fetch('/convert', { method: 'POST', body: fd });
      const data = await res.json();
      busy(false);
      if (!res.ok) return fail(data.error || 'Conversion failed.');
      out.textContent = data.markdown || '(empty result)';
      out.style.display = 'block';
      status.textContent = 'Done. Showing preview above.';
    } catch (err) {
      busy(false); fail('Request failed: ' + err.message);
    }
  });

  downloadBtn.addEventListener('click', async () => {
    if (!selected) return;
    busy(true, 'Converting & preparing download…');
    try {
      const fd = new FormData();
      fd.append('file', selected);
      fd.append('download', '1');
      const res = await fetch('/convert', { method: 'POST', body: fd });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        busy(false); return fail(data.error || 'Conversion failed.');
      }
      const blob = await res.blob();
      const name = (res.headers.get('Content-Disposition') || '').match(/filename="?([^"]+)"?/);
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name ? name[1] : 'converted.md';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(a.href);
      busy(false);
      status.textContent = 'Downloaded ' + a.download;
    } catch (err) {
      busy(false); fail('Request failed: ' + err.message);
    }
  });
</script>
</body>
</html>
